name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: airquality
          POSTGRES_USER: aq_user
          POSTGRES_PASSWORD: testpw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aq_user -d airquality"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://aq_user:testpw@localhost:5432/airquality
      POSTGRES_PASSWORD: testpw

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest --cov=src/airqualitycast --cov-report=xml --cov-fail-under=75

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
